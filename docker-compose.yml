services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - API_URL=http://backend:8000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - postgres_db
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=surveydb
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres_db:5432/survey_auth
      # Set to 'update' to update documents with unique titles, 'delete' to remove them, or 'safe' to skip migration
      - MONGO_MIGRATION_STRATEGY=delete
      - SQL_MIGRATION_STRATEGY=delete
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-nano}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_TIMEOUT_SECONDS=${OPENAI_TIMEOUT_SECONDS:-30}
      - OPENAI_GENERATION_RETRIES=${OPENAI_GENERATION_RETRIES:-1}
      - SURVEY_GENERATION_PROMPT_MAX_LENGTH=${SURVEY_GENERATION_PROMPT_MAX_LENGTH:-2000}

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  postgres_db:
    image: postgres:17-trixie
    environment:
      POSTGRES_DB: survey_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d survey_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
  pgdata:

