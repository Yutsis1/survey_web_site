name: Chromatic Frontend
run-name: ${{ github.actor }} Chromatic Frontend

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'frontend/**'
      - '.github/workflows/chromatic-frontend.yml'

concurrency:
  group: chromatic-frontend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: 'lts/*'
  WORKDIR: ./frontend

jobs:
  chromatic:
    # if: ${{ github.event.pull_request.state == 'open' && github.event.pull_request.draft == false }}
    if: false # temporarily disable chromatic
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKDIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: npm run chromatic -- --project-token=$CHROMATIC_PROJECT_TOKEN
